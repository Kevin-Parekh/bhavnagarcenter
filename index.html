<!DOCTYPE html>
<html lang="gu" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#1565C0" />
  <title>ભાવનગર ત્રિમંદિર — સૂચનાઓ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Hind+Vadodara:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue:         #1565C0;
      --blue-dark:    #003c8f;
      --blue-mid:     #1976D2;
      --cream:        #F5F8FF;
      --cream-dark:   #E8EEFF;
      --text:         #0A1628;
      --text-muted:   #4A5A7A;
      --border:       rgba(21,101,192,.22);
    }

    /* ── Base: mobile-first ──────────────────────────────────── */
    html { height: 100%; }
    body {
      font-family: 'Hind Vadodara', sans-serif;
      background: var(--cream);
      color: var(--text);
      min-height: 100%;
      display: flex;
      flex-direction: column;
      background-image:
        radial-gradient(ellipse at 15% 15%, rgba(21,101,192,.06) 0%, transparent 55%),
        radial-gradient(ellipse at 85% 85%, rgba(25,118,210,.04) 0%, transparent 55%);
    }

    /* ── Header ─────────────────────────────────────────────── */
    header {
      flex-shrink: 0;
      background: linear-gradient(135deg, #1565C0 0%, #1976D2 50%, #0D47A1 100%);
      padding: 12px 44px;
      display: flex; align-items: center; justify-content: center;
      position: relative;
      box-shadow: 0 4px 24px rgba(13,60,143,.30);
    }
    header::before, header::after {
      content: "❋"; position: absolute; top: 50%; transform: translateY(-50%);
      color: rgba(255,255,255,.38); font-size: 1.4rem;
    }
    header::before { left: 12px; }
    header::after  { right: 12px; }
    header h1 {
      font-size: clamp(1.15rem, 4vw, 2.4rem);
      font-weight: 700; color: #fff;
      text-shadow: 0 2px 8px rgba(0,0,0,.18);
      letter-spacing: .02em; line-height: 1.25; text-align: center;
    }
    header .sub {
      font-size: clamp(0.70rem, 2vw, 1.05rem);
      color: rgba(255,255,255,.80); margin-top: 2px;
      font-weight: 500; text-align: center;
    }
    .header-rule {
      height: 3px; flex-shrink: 0;
      background: linear-gradient(90deg, transparent, var(--blue), transparent);
    }

    /* ── Backup banner ───────────────────────────────────────── */
    #backup-banner {
      display: none; flex-shrink: 0;
      background: #FFF8E1; border-bottom: 2px solid #FFCA28;
      padding: 7px 16px; font-size: 0.82rem;
      color: #5D3A00; text-align: center; font-weight: 500;
    }
    #backup-banner.visible { display: block; }

    /* ── Stage: holds the slide card + side arrows on desktop ── */
    #stage {
      flex: 1;
      min-height: 0;        /* critical: lets flex child shrink & scroll */
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 16px 12px;
      position: relative;
      overflow: hidden;
    }

    /* ── Slide card ──────────────────────────────────────────── */
    #slide-card {
      width: 100%;
      max-width: 1100px;
      max-height: 100%;     /* never taller than the stage */
      overflow-y: auto;     /* scroll inside card if content is long */
      scroll-behavior: smooth;
      background: #fff;
      border: 2px solid var(--border);
      border-radius: 16px;
      padding: 20px 18px;
      box-shadow: 0 6px 30px rgba(21,101,192,.07), 0 0 0 1px rgba(21,101,192,.07) inset;
      position: relative;
    }

    /* Subtle styled scrollbar — visible on desktop, auto-hidden on mobile */
    #slide-card::-webkit-scrollbar       { width: 6px; }
    #slide-card::-webkit-scrollbar-track { background: transparent; }
    #slide-card::-webkit-scrollbar-thumb {
      background: rgba(21,101,192,.35);
      border-radius: 4px;
    }
    #slide-card::-webkit-scrollbar-thumb:hover { background: var(--blue); }
    #slide-card::before {
      content: ""; position: absolute; left: 0; top: 10%; bottom: 10%;
      width: 4px;
      background: linear-gradient(to bottom, var(--blue), #42A5F5);
      border-radius: 0 4px 4px 0;
    }

    /* ── Points list ─────────────────────────────────────────── */
    .slide-points {
      list-style: none; display: flex; flex-direction: column;
      /* Mobile: tighter gap */
      gap: 16px;
    }
    .slide-point {
      display: flex; align-items: flex-start;
      gap: 12px;
      animation: fadeUp .35s ease both;
    }
    @keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:none} }

    .point-badge {
      flex-shrink: 0;
      /* Mobile: smaller badge */
      width: 34px; height: 34px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--blue) 0%, #42A5F5 100%);
      color: #fff; font-size: 1rem; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 3px 10px rgba(21,101,192,.30); margin-top: 3px;
    }
    .point-text {
      /* Mobile: readable but compact */
      font-size: clamp(1.15rem, 4.5vw, 2.5rem);
      font-weight: 500; line-height: 1.65; color: var(--text); letter-spacing: .01em;
    }

    /* ── State messages ──────────────────────────────────────── */
    .state-wrap {
      display: flex; flex-direction: column;
      align-items: center; gap: 12px; text-align: center;
      padding: 20px 0;
    }
    .state-icon  { font-size: 2.8rem; opacity: .55; }
    .state-label {
      font-size: clamp(1rem, 3.5vw, 1.75rem);
      font-weight: 500; color: var(--text-muted); line-height: 1.6;
    }
    .spinner {
      width: 44px; height: 44px;
      border: 5px solid var(--border); border-top-color: var(--blue);
      border-radius: 50%; animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Desktop side arrows (hidden on mobile) ──────────────── */
    .nav-arrow-side {
      display: none; /* hidden on mobile */
      position: absolute; top: 50%; transform: translateY(-50%);
      width: 52px; height: 52px; border-radius: 50%;
      background: rgba(255,255,255,.75); backdrop-filter: blur(6px);
      border: 2px solid var(--border); color: var(--blue-dark);
      font-size: 1.5rem; cursor: pointer;
      align-items: center; justify-content: center;
      transition: background .2s, transform .15s, opacity .2s;
      box-shadow: 0 4px 16px rgba(0,0,0,.09); z-index: 10;
    }
    .nav-arrow-side:hover  { background: var(--cream-dark); transform: translateY(-50%) scale(1.08); }
    .nav-arrow-side:active { transform: translateY(-50%) scale(.94); }
    .nav-arrow-side:disabled { opacity: .22; cursor: default; pointer-events: none; }
    #btn-prev-side { left: 10px; }
    #btn-next-side { right: 10px; }

    /* ── Mobile bottom navigation bar ───────────────────────── */
    #mobile-nav {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      gap: 10px;
      background: #fff;
      border-top: 1.5px solid var(--border);
    }
    .nav-btn-mobile {
      flex: 1;
      padding: 12px 8px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      background: var(--cream);
      color: var(--blue-dark);
      font-size: 1.1rem; font-weight: 700;
      cursor: pointer;
      touch-action: manipulation;
      transition: background .15s, opacity .2s;
      display: flex; align-items: center; justify-content: center; gap: 6px;
      font-family: 'Hind Vadodara', sans-serif;
    }
    .nav-btn-mobile:active  { background: #BBDEFB; }
    .nav-btn-mobile:disabled { opacity: .28; cursor: default; pointer-events: none; }

    #mobile-counter {
      flex-shrink: 0;
      text-align: center;
      font-size: 0.92rem; font-weight: 600;
      color: var(--text-muted);
      min-width: 52px;
    }

    /* ── Dots (shown on desktop footer, hidden in mobile nav) ── */
    #slide-footer {
      display: none; /* hidden on mobile */
      flex-shrink: 0;
      align-items: center; justify-content: center;
      gap: 14px; padding: 10px 20px 10px;
    }
    #slide-counter { font-size: 1rem; color: var(--text-muted); font-weight: 500; min-width: 72px; text-align: center; }
    #dots-container { display: flex; gap: 8px; align-items: center; }
    .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--border); transition: background .25s, transform .25s; cursor: pointer; }
    .dot.active { background: var(--blue); transform: scale(1.4); }

    /* ── Hint bar ────────────────────────────────────────────── */
    #kb-hint {
      display: none; /* hidden on mobile */
      flex-shrink: 0; text-align: center;
      padding: 5px 20px 10px;
      font-size: 0.82rem; color: var(--text-muted);
    }
    #swipe-hint {
      flex-shrink: 0; text-align: center;
      padding: 4px 12px 8px;
      font-size: 0.72rem; color: var(--text-muted);
    }

    /* ── Slide transitions ───────────────────────────────────── */
    #slide-card.exit-l  { animation: exL .18s ease forwards; }
    #slide-card.exit-r  { animation: exR .18s ease forwards; }
    #slide-card.enter-l { animation: enL .26s ease both; }
    #slide-card.enter-r { animation: enR .26s ease both; }
    @keyframes exL { to{opacity:0;transform:translateX(-28px)} }
    @keyframes exR { to{opacity:0;transform:translateX(28px)} }
    @keyframes enL { from{opacity:0;transform:translateX(28px)}  to{opacity:1;transform:none} }
    @keyframes enR { from{opacity:0;transform:translateX(-28px)} to{opacity:1;transform:none} }

    /* ── Updated chip ────────────────────────────────────────── */
    #updated-chip {
      position: fixed; bottom: 70px; right: 12px;
      background: rgba(255,255,255,.85); backdrop-filter: blur(4px);
      border: 1px solid var(--border); border-radius: 20px;
      padding: 4px 12px; font-size: 0.70rem; color: var(--text-muted);
      opacity: 0; transition: opacity .4s; pointer-events: none; z-index: 20;
    }
    #updated-chip.show { opacity: 1; }

    /* ══════════════════════════════════════════════════════════
       TABLET  (≥ 600px)
    ══════════════════════════════════════════════════════════ */
    @media (min-width: 600px) {
      #stage        { padding: 20px 28px; }
      #slide-card   { padding: 28px 32px; border-radius: 18px; }
      .slide-points { gap: 22px; }
      .slide-point  { gap: 16px; }
      .point-badge  { width: 40px; height: 40px; font-size: 1.1rem; }
      .point-text   { font-size: clamp(1.3rem, 3.5vw, 2.5rem); }

      /* Slightly larger mobile nav buttons */
      .nav-btn-mobile { padding: 14px 12px; font-size: 1.15rem; }
    }

    /* ══════════════════════════════════════════════════════════
       LAPTOP / PROJECTOR  (≥ 900px)
       Restore the original full-screen projector layout
    ══════════════════════════════════════════════════════════ */
    @media (min-width: 900px) {
      /* Lock body to viewport height — no scroll on projector */
      html, body { height: 100%; overflow: hidden; }

      header { padding: 14px 54px; }
      header::before, header::after { font-size: 1.6rem; }
      header::before { left: 18px; }
      header::after  { right: 18px; }

      /* Side arrows visible on desktop */
      .nav-arrow-side { display: flex; }

      /* Stage: horizontal padding for side arrows; min-height:0 lets card scroll */
      #stage { padding: 24px 76px; min-height: 0; }

      #slide-card {
        padding: clamp(28px, 4vw, 58px) clamp(32px, 5vw, 80px);
        border-radius: 20px;
        /* On projector, card is bounded by stage height and scrolls if needed */
        max-height: calc(100vh - 180px);
      }
      #slide-card::before { width: 5px; }

      .slide-points { gap: clamp(22px, 3vw, 40px); }
      .slide-point  { gap: clamp(16px, 2.5vw, 28px); }
      .point-badge  {
        width: clamp(40px, 4vw, 54px); height: clamp(40px, 4vw, 54px);
        font-size: clamp(1.1rem, 1.8vw, 1.5rem);
      }
      .point-text { font-size: clamp(1.6rem, 3vw, 2.5rem); }

      /* Show desktop footer, hide mobile nav */
      #mobile-nav   { display: none; }
      #swipe-hint   { display: none; }
      #slide-footer { display: flex; }
      #kb-hint      { display: block; }

      #updated-chip { bottom: 52px; }
    }
  </style>
</head>
<body>

  <header>
    <div>
      <h1>ભાવનગર ત્રિમંદિર માહિતી</h1>
      <p class="sub">Bhavnagar Trimandir — Session Notices</p>
    </div>
  </header>
  <div class="header-rule"></div>

  <div id="backup-banner">
    ⚠️ Offline Backup Mode — Admin ની backup link વડે Load થઈ.
  </div>

  <!-- ── Stage ───────────────────────────────────────────────── -->
  <div id="stage">

    <!-- Desktop side arrows (hidden on mobile via CSS) -->
    <button class="nav-arrow-side" id="btn-prev-side" onclick="navigate(-1)" aria-label="Previous" disabled>&#8592;</button>

    <div id="slide-card">
      <div class="state-wrap">
        <div class="spinner"></div>
        <p class="state-label">સૂચનાઓ Load થઈ રહ્યી છે…</p>
      </div>
    </div>

    <button class="nav-arrow-side" id="btn-next-side" onclick="navigate(1)" aria-label="Next" disabled>&#8594;</button>
  </div>

  <!-- ── Desktop footer: dots + counter ──────────────────────── -->
  <div id="slide-footer">
    <span id="slide-counter"></span>
    <div id="dots-container"></div>
  </div>
  <div id="kb-hint">⬅ ➡ Arrow Keys &nbsp;|&nbsp; Click Arrows to navigate</div>

  <!-- ── Mobile bottom navigation bar ────────────────────────── -->
  <div id="mobile-nav">
    <button class="nav-btn-mobile" id="btn-prev-mob" onclick="navigate(-1)" disabled>&#8592; પાછળ</button>
    <span id="mobile-counter">—</span>
    <button class="nav-btn-mobile" id="btn-next-mob" onclick="navigate(1)" disabled>આગળ &#8594;</button>
  </div>
  <div id="swipe-hint">← સ્વાઇપ કરો →</div>

  <div id="updated-chip"></div>

  <!-- ── Script ───────────────────────────────────────────────── -->
  <script type="module">
    import { JSONBIN_API_KEY, JSONBIN_BIN_ID } from "./config.js";

    const BASE    = "https://api.jsonbin.io/v3/b";
    const POLL_MS = 10000;
    const params  = new URLSearchParams(window.location.search);
    let   binId   = JSONBIN_BIN_ID || params.get("bin") || localStorage.getItem("satsang_bin_id") || "";

    let slides        = [];
    let currentSlide  = 0;
    let lastUpdatedAt = 0;

    // ── DOM refs ──────────────────────────────────────────────
    const slideCard     = document.getElementById("slide-card");
    const btnPrevSide   = document.getElementById("btn-prev-side");
    const btnNextSide   = document.getElementById("btn-next-side");
    const btnPrevMob    = document.getElementById("btn-prev-mob");
    const btnNextMob    = document.getElementById("btn-next-mob");
    const slideCounter  = document.getElementById("slide-counter");
    const mobileCounter = document.getElementById("mobile-counter");
    const dotsWrap      = document.getElementById("dots-container");
    const backupBanner  = document.getElementById("backup-banner");
    const updatedChip   = document.getElementById("updated-chip");

    // ── Points-per-slide logic ────────────────────────────────
    // On small screens show 1 point per slide always (easier to read)
    // On large screens show 2 short points per slide
    const LONG = 80;
    function buildSlides(pts) {
      const isMobile = window.innerWidth < 900;
      const out = []; let i = 0;
      while (i < pts.length) {
        const p = pts[i];
        if (isMobile || p.length > LONG) {
          out.push([p]); i++;
        } else if (i + 1 < pts.length && pts[i+1].length <= LONG) {
          out.push([p, pts[i+1]]); i += 2;
        } else {
          out.push([p]); i++;
        }
      }
      return out;
    }

    // ── Render ────────────────────────────────────────────────
    function renderSlide(dir = null) {
      if (dir !== null) {
        const ex = dir > 0 ? "exit-l" : "exit-r";
        const en = dir > 0 ? "enter-l" : "enter-r";
        slideCard.classList.add(ex);
        setTimeout(() => { slideCard.classList.remove(ex); paint(en); }, 185);
      } else {
        paint(null);
      }
      updateNav();
    }

    function paint(enterCls) {
      const pts = slides[currentSlide];
      let globalIdx = 0;
      for (let s = 0; s < currentSlide; s++) globalIdx += slides[s].length;

      const ul = document.createElement("ul");
      ul.className = "slide-points";
      pts.forEach((text, i) => {
        const li = document.createElement("li");
        li.className = "slide-point";
        li.style.animationDelay = `${i * 55}ms`;
        li.innerHTML = `
          <span class="point-badge">${globalIdx + i + 1}</span>
          <span class="point-text">${esc(text)}</span>
        `;
        ul.appendChild(li);
      });

      slideCard.innerHTML = "";
      slideCard.appendChild(ul);
      if (enterCls) {
        slideCard.classList.add(enterCls);
        setTimeout(() => slideCard.classList.remove(enterCls), 300);
      }
    }

    function updateNav() {
      const atStart = currentSlide === 0;
      const atEnd   = currentSlide === slides.length - 1;
      const label   = slides.length ? `${currentSlide + 1} / ${slides.length}` : "—";

      // Side arrows (desktop)
      btnPrevSide.disabled = atStart;
      btnNextSide.disabled = atEnd;

      // Mobile buttons
      btnPrevMob.disabled = atStart;
      btnNextMob.disabled = atEnd;

      // Counters
      slideCounter.textContent  = label;
      mobileCounter.textContent = label;

      // Dots
      dotsWrap.innerHTML = "";
      slides.forEach((_, i) => {
        const d = document.createElement("span");
        d.className = "dot" + (i === currentSlide ? " active" : "");
        d.onclick = () => goTo(i);
        dotsWrap.appendChild(d);
      });
    }

    // ── Navigation ────────────────────────────────────────────
    window.navigate = function(delta) {
      const n = currentSlide + delta;
      if (n < 0 || n >= slides.length) return;
      currentSlide = n;
      renderSlide(delta);
    };

    function goTo(idx) {
      if (idx === currentSlide) return;
      const dir = idx > currentSlide ? 1 : -1;
      currentSlide = idx;
      renderSlide(dir);
    }

    // Keyboard arrows (laptop/projector)
    document.addEventListener("keydown", e => {
      if (e.key === "ArrowRight" || e.key === "ArrowDown") navigate(1);
      if (e.key === "ArrowLeft"  || e.key === "ArrowUp")   navigate(-1);
    });

    // Touch swipe (mobile)
    let touchStartX = 0;
    slideCard.addEventListener("touchstart", e => { touchStartX = e.touches[0].clientX; }, { passive: true });
    slideCard.addEventListener("touchend", e => {
      const diff = touchStartX - e.changedTouches[0].clientX;
      if (Math.abs(diff) > 50) navigate(diff > 0 ? 1 : -1);
    }, { passive: true });

    // ── State messages ────────────────────────────────────────
    function showState(icon, msg) {
      slideCard.innerHTML = `<div class="state-wrap"><span class="state-icon">${icon}</span><p class="state-label">${msg}</p></div>`;
      btnPrevSide.disabled = btnNextSide.disabled = true;
      btnPrevMob.disabled  = btnNextMob.disabled  = true;
      slideCounter.textContent = mobileCounter.textContent = "—";
      dotsWrap.innerHTML = "";
    }

    function showLoading() {
      slideCard.innerHTML = `<div class="state-wrap"><div class="spinner"></div><p class="state-label">સૂચનાઓ Load થઈ રહ્યી છે…</p></div>`;
    }

    // ── Load points ───────────────────────────────────────────
    function loadPoints(pts, updatedAt) {
      const filtered = pts.map(p => String(p).trim()).filter(Boolean);
      if (!filtered.length) { showState("📭", "Admin હજી સૂચનાઓ Submit કરી નથી."); return; }
      slides = buildSlides(filtered);
      currentSlide = 0;
      renderSlide(null);

      if (updatedAt) {
        const t = new Date(updatedAt).toLocaleTimeString("gu-IN");
        updatedChip.textContent = `Updated: ${t}`;
        updatedChip.classList.add("show");
        setTimeout(() => updatedChip.classList.remove("show"), 3500);
      }
    }

    // Rebuild slides if window is resized (mobile ↔ desktop switch)
    let resizeTimer;
    window.addEventListener("resize", () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(() => {
        if (slides.length === 0) return;
        // Re-fetch current data to rebuild slide groups
        const allPts = slides.flat();
        slides = buildSlides(allPts);
        currentSlide = Math.min(currentSlide, slides.length - 1);
        renderSlide(null);
      }, 300);
    });

    // ── Escape helper ─────────────────────────────────────────
    function esc(s) {
      return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    }

    // ── Backup URL mode ───────────────────────────────────────
    function tryBackup() {
      if (params.get("backup") !== "1") return false;
      try {
        const pts = JSON.parse(params.get("data") || "[]");
        if (!Array.isArray(pts) || !pts.length) return false;
        backupBanner.classList.add("visible");
        loadPoints(pts, null);
        return true;
      } catch { return false; }
    }

    // ── JSONBin polling ───────────────────────────────────────
    async function poll() {
      if (!binId) {
        showState("⚙️", "config.js માં JSONBIN_BIN_ID paste કરો.");
        return;
      }
      try {
        const res  = await fetch(`${BASE}/${binId}/latest`, {
          headers: { "X-Master-Key": JSONBIN_API_KEY }
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const json = await res.json();
        const data = json.record;

        if (data.updatedAt !== lastUpdatedAt) {
          lastUpdatedAt = data.updatedAt;
          loadPoints(data.points || [], data.updatedAt);
        }
      } catch (err) {
        console.warn("Poll error:", err);
        if (slides.length === 0) showState("⚠️", "Load Error — Internet ચેક કરો.");
      }
    }

    // ── Start ─────────────────────────────────────────────────
    if (!tryBackup()) {
      showLoading();
      poll();
      setInterval(poll, POLL_MS);
    }
  </script>

</body>
</html>
